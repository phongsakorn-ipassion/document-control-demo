schema: spec-driven

context: |
  Project: Alfresco ACS-style Document Intelligence demo (Presale) — demo-v2
  Active spec: demo-v2
  Visual source of truth: prototype-revamp.html (sibling of this openspec/ folder)
    → Claude Code MUST open and read prototype-revamp.html before implementing any screen.
    → Every component, color, layout, and interaction in the spec maps to this prototype.
    → When spec language is ambiguous, the prototype wins.

  Tech stack:
    - Build tool:     Vite 5
    - UI framework:   React 18 (JSX, functional components + hooks only)
    - Styling:        Tailwind CSS v3 (config in tailwind.config.js)
    - UI state:       Zustand (single store — useAppStore.js)
    - Server state:   Supabase JS client v2 (custom hooks, direct queries)
    - Database:       Supabase (PostgreSQL) — full schema in design.md
    - Routing:        React Router v6 (hash-based for GitHub Pages)
    - Deploy:         GitHub Actions → GitHub Pages
    - Icons:          Inline SVG components — copy exact paths from prototype-revamp.html
    - Fonts:          Tailwind system font stack (no Google Fonts CDN)

  File structure (follow exactly):
    v2/
    ├── .github/workflows/deploy.yml
    ├── public/
    ├── src/
    │   ├── components/
    │   │   ├── Avatar.jsx
